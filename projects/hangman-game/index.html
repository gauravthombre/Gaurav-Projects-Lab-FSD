<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hangman Game</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1>🪢 Hangman</h1>

    <div class="game-area">
      <!-- Hangman Drawing -->
      <div class="drawing-section">
        <svg id="hangmanSvg" viewBox="0 0 200 220" width="180" height="180">
          <!-- Gallows -->
          <line x1="20" y1="210" x2="180" y2="210" stroke="#333" stroke-width="4"/>
          <line x1="60" y1="210" x2="60" y2="20" stroke="#333" stroke-width="4"/>
          <line x1="60" y1="20" x2="130" y2="20" stroke="#333" stroke-width="4"/>
          <line x1="130" y1="20" x2="130" y2="45" stroke="#333" stroke-width="4"/>
          <!-- Body parts (hidden by default) -->
          <circle id="h-head" cx="130" cy="62" r="17" stroke="#333" stroke-width="3" fill="none" style="display:none"/>
          <line id="h-body" x1="130" y1="79" x2="130" y2="135" stroke="#333" stroke-width="3" style="display:none"/>
          <line id="h-larm" x1="130" y1="95" x2="100" y2="120" stroke="#333" stroke-width="3" style="display:none"/>
          <line id="h-rarm" x1="130" y1="95" x2="160" y2="120" stroke="#333" stroke-width="3" style="display:none"/>
          <line id="h-lleg" x1="130" y1="135" x2="100" y2="165" stroke="#333" stroke-width="3" style="display:none"/>
          <line id="h-rleg" x1="130" y1="135" x2="160" y2="165" stroke="#333" stroke-width="3" style="display:none"/>
        </svg>
        <p id="wrongCount" class="wrong-count">Wrong: 0 / 6</p>
      </div>

      <!-- Word and Keyboard -->
      <div class="word-section">
        <p class="category-label" id="categoryLabel"></p>
        <div class="word-display" id="wordDisplay"></div>
        <p id="feedback" class="feedback"></p>
        <div class="keyboard" id="keyboard"></div>
      </div>
    </div>

    <div class="bottom-bar">
      <button class="btn" id="newWordBtn">New Word</button>
      <span class="score-display">Wins: <strong id="wins">0</strong> | Losses: <strong id="losses">0</strong></span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
