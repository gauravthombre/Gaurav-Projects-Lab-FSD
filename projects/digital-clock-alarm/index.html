<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock + Alarm System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid #00ff88;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        .clock-display {
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            letter-spacing: 5px;
            margin-bottom: 10px;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            font-family: 'Courier New', monospace;
        }

        .date-display {
            text-align: center;
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 30px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #00ff88, transparent);
            margin: 20px 0;
        }

        .alarm-section {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="time"],
        input[type="text"] {
            flex: 1;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00ff88;
            border-radius: 5px;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
        }

        input[type="time"]::placeholder,
        input[type="text"]::placeholder {
            color: #00ff88;
            opacity: 0.5;
        }

        input[type="time"]:focus,
        input[type="text"]:focus {
            outline: none;
            background: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            background: #00ff88;
            color: #0f0f1e;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: #00cc6f;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button.delete-btn {
            background: #ff4444;
            color: white;
            flex: 0.5;
        }

        button.delete-btn:hover {
            background: #cc0000;
        }

        .alarm-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .alarm-item {
            background: rgba(0, 255, 136, 0.1);
            border-left: 3px solid #00ff88;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .alarm-time {
            font-size: 1.5rem;
            color: #00ff88;
            font-weight: bold;
        }

        .alarm-label {
            color: #aaa;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .alarm-info {
            flex: 1;
        }

        .alarm-status {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toggle-switch {
            width: 50px;
            height: 25px;
            background: #444;
            border: 2px solid #00ff88;
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }

        .toggle-switch.active {
            background: #00ff88;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 19px;
            height: 19px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.3s;
        }

        .toggle-switch.active::after {
            left: 25px;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        @media (max-width: 600px) {
            .clock-display {
                font-size: 3rem;
            }

            .container {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="clock-display" id="clockDisplay">00:00:00</div>
        <div class="date-display" id="dateDisplay">Loading...</div>

        <div class="divider"></div>

        <div class="alarm-section">
            <div class="section-title">⏰ Set Alarm</div>
            <div class="input-group">
                <input type="time" id="alarmTime" placeholder="Set time">
                <input type="text" id="alarmLabel" placeholder="Label (optional)">
            </div>
            <div class="button-group">
                <button onclick="addAlarm()">Add Alarm</button>
            </div>
        </div>

        <div class="alarm-section">
            <div class="section-title">🔔 Active Alarms</div>
            <div class="alarm-list" id="alarmList">
                <div class="empty-state">No alarms set</div>
            </div>
        </div>
    </div>

    <audio id="alarmSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAA==" type="audio/wav">
    </audio>

    <script>
        let alarms = JSON.parse(localStorage.getItem('alarms')) || [];

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clockDisplay').textContent = `${hours}:${minutes}:${seconds}`;
            
            const dateOptions = { weekday: 'long', month: 'short', day: 'numeric' };
            document.getElementById('dateDisplay').textContent = now.toLocaleDateString('en-US', dateOptions);

            checkAlarms(now);
        }

        function checkAlarms(currentTime) {
            const hours = String(currentTime.getHours()).padStart(2, '0');
            const minutes = String(currentTime.getMinutes()).padStart(2, '0');
            const currentTimeStr = `${hours}:${minutes}`;

            alarms.forEach(alarm => {
                if (alarm.active && alarm.time === currentTimeStr && !alarm.triggered) {
                    triggerAlarm(alarm);
                }
            });
        }

        function triggerAlarm(alarm) {
            alarm.triggered = true;
            saveAlarms();
            
            // Show notification
            alert(`⏰ Alarm: ${alarm.label || 'Alarm'}`);
            
            // Play sound
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            playBeep(audioContext);
        }

        function playBeep(audioContext) {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    
                    osc.frequency.value = 800;
                    osc.type = 'sine';
                    
                    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                    
                    osc.start(audioContext.currentTime);
                    osc.stop(audioContext.currentTime + 0.2);
                }, i * 300);
            }
        }

        function addAlarm() {
            const timeInput = document.getElementById('alarmTime').value;
            const labelInput = document.getElementById('alarmLabel').value;

            if (!timeInput) {
                alert('Please set a time');
                return;
            }

            const alarm = {
                id: Date.now(),
                time: timeInput,
                label: labelInput || 'Alarm',
                active: true,
                triggered: false
            };

            alarms.push(alarm);
            saveAlarms();
            renderAlarms();

            document.getElementById('alarmTime').value = '';
            document.getElementById('alarmLabel').value = '';
        }

        function deleteAlarm(id) {
            alarms = alarms.filter(a => a.id !== id);
            saveAlarms();
            renderAlarms();
        }

        function toggleAlarm(id) {
            const alarm = alarms.find(a => a.id === id);
            if (alarm) {
                alarm.active = !alarm.active;
                alarm.triggered = false;
                saveAlarms();
                renderAlarms();
            }
        }

        function saveAlarms() {
            localStorage.setItem('alarms', JSON.stringify(alarms));
        }

        function renderAlarms() {
            const alarmList = document.getElementById('alarmList');
            
            if (alarms.length === 0) {
                alarmList.innerHTML = '<div class="empty-state">No alarms set</div>';
                return;
            }

            alarmList.innerHTML = alarms.map(alarm => `
                <div class="alarm-item">
                    <div class="alarm-info">
                        <div class="alarm-time">${alarm.time}</div>
                        <div class="alarm-label">${alarm.label}</div>
                    </div>
                    <div class="alarm-status">
                        <div class="toggle-switch ${alarm.active ? 'active' : ''}" 
                             onclick="toggleAlarm(${alarm.id})"></div>
                        <button class="delete-btn" onclick="deleteAlarm(${alarm.id})">✕</button>
                    </div>
                </div>
            `).join('');
        }

        // Update clock every second
        updateClock();
        setInterval(updateClock, 1000);

        // Initial render
        renderAlarms();
    </script>
</body>
</html>
