<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f6f8;
      padding: 20px;
    }
    .card {
      background: #fff;
      width: 100%;
      max-width: 420px;
      padding: 26px;
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 { margin-bottom: 16px; color: #333; font-size: 1.5rem; }
    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 1rem;
      margin-bottom: 12px;
    }
    input:focus {
      outline: none;
      border-color: #4c8bf5;
      box-shadow: 0 0 0 2px rgba(76,139,245,0.15);
    }
    .buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      background: #4c8bf5;
      color: #fff;
      transition: background 0.2s;
    }
    button:hover { background: #3a73d9; }
    .secondary { background: #e8f0ff; color: #2a4dbf; }
    .secondary:hover { background: #d8e6ff; }
    #qrcode {
      margin: 10px auto;
      padding: 10px;
      background: #fff;
      border-radius: 12px;
      display: inline-block;
    }
    .error {
      margin-top: 10px;
      color: #c62828;
      font-size: 0.9rem;
      display: none;
    }
    @media (max-width: 420px) {
      .card { padding: 22px; }
      h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>QR Code Generator</h1>
    <input type="text" id="textInput" placeholder="Enter text or URL" />

    <div class="buttons">
      <button id="genBtn">Generate</button>
      <button class="secondary" id="downloadBtn">Download</button>
      <button class="secondary" id="clearBtn">Clear</button>
    </div>

    <div id="qrcode"></div>
    <div class="error" id="errorMsg"></div>
  </div>

  <script>
    const textInput = document.getElementById('textInput');
    const genBtn = document.getElementById('genBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const qrContainer = document.getElementById('qrcode');
    const errorMsg = document.getElementById('errorMsg');

    let qr;

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }
    function clearError() { errorMsg.style.display = 'none'; }

    genBtn.addEventListener('click', () => {
      const text = textInput.value.trim();
      if (!text) {
        showError('Please enter text or URL');
        return;
      }
      if (text.length > 500) {
        showError('Input too long (max 500 chars)');
        return;
      }
      clearError();
      qrContainer.innerHTML = '';
      qr = new QRCode(qrContainer, {
        text: text,
        width: 200,
        height: 200
      });
    });

    downloadBtn.addEventListener('click', () => {
      const img = qrContainer.querySelector('img') || qrContainer.querySelector('canvas');
      if (!img) return;

      let url;
      if (img.tagName === 'IMG') url = img.src;
      else url = img.toDataURL('image/png');

      const a = document.createElement('a');
      a.href = url;
      a.download = 'qrcode.png';
      a.click();
    });

    clearBtn.addEventListener('click', () => {
      textInput.value = '';
      qrContainer.innerHTML = '';
      clearError();
    });
  </script>
</body>
</html>
