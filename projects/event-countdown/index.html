<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Countdown App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .add-event-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            height: fit-content;
        }

        .form-title {
            color: #333;
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="datetime-local"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="datetime-local"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-add-event {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-add-event:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-add-event:active {
            transform: translateY(0);
        }

        .events-section {
            display: grid;
            gap: 20px;
        }

        .event-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border-left: 5px solid #667eea;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .event-card:hover {
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        .event-card.expired {
            opacity: 0.7;
            border-left-color: #ccc;
        }

        .event-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .event-title {
            color: #333;
            font-size: 1.3rem;
            font-weight: 600;
            word-break: break-word;
            flex: 1;
        }

        .event-date {
            color: #999;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        .event-description {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .countdown {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .countdown-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .countdown-item {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
        }

        .countdown-value {
            font-size: 1.5rem;
            font-weight: 700;
            display: block;
        }

        .countdown-unit {
            font-size: 0.75rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .event-status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-active {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-expired {
            background: #ffe0b2;
            color: #e65100;
        }

        .empty-state {
            background: white;
            border-radius: 20px;
            padding: 60px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .empty-state-text {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .empty-state-subtext {
            color: #999;
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .countdown-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 600px) {
            .header {
                margin-bottom: 30px;
            }

            h1 {
                font-size: 1.7rem;
            }

            .add-event-card,
            .event-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎉 Event Countdown</h1>
            <p class="subtitle">Create and track your upcoming events</p>
        </div>

        <div class="main-grid">
            <div class="add-event-card">
                <h2 class="form-title">Add New Event</h2>
                <form id="eventForm">
                    <div class="form-group">
                        <label for="eventTitle">Event Title</label>
                        <input type="text" id="eventTitle" placeholder="Birthday Party" required>
                    </div>

                    <div class="form-group">
                        <label for="eventDateTime">Date & Time</label>
                        <input type="datetime-local" id="eventDateTime" required>
                    </div>

                    <div class="form-group">
                        <label for="eventDescription">Description (Optional)</label>
                        <textarea id="eventDescription" placeholder="Add event details..."></textarea>
                    </div>

                    <button type="submit" class="btn-add-event">Add Event</button>
                </form>
            </div>

            <div class="events-section" id="eventsContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">📅</div>
                    <div class="empty-state-text">No events yet</div>
                    <div class="empty-state-subtext">Create an event to get started!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let events = JSON.parse(localStorage.getItem('events')) || [];

        const form = document.getElementById('eventForm');
        const container = document.getElementById('eventsContainer');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const event = {
                id: Date.now(),
                title: document.getElementById('eventTitle').value,
                dateTime: document.getElementById('eventDateTime').value,
                description: document.getElementById('eventDescription').value
            };

            events.push(event);
            saveEvents();
            renderEvents();
            form.reset();
        });

        function saveEvents() {
            localStorage.setItem('events', JSON.stringify(events));
        }

        function deleteEvent(id) {
            events = events.filter(e => e.id !== id);
            saveEvents();
            renderEvents();
        }

        function renderEvents() {
            if (events.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📅</div>
                        <div class="empty-state-text">No events yet</div>
                        <div class="empty-state-subtext">Create an event to get started!</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = events.map(event => {
                const eventDate = new Date(event.dateTime);
                const now = new Date();
                const expired = now > eventDate;
                const diff = eventDate - now;

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const minutes = Math.floor((diff / 1000 / 60) % 60);
                const seconds = Math.floor((diff / 1000) % 60);

                const dateStr = eventDate.toLocaleDateString('en-US', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });
                const timeStr = eventDate.toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });

                return `
                    <div class="event-card ${expired ? 'expired' : ''}">
                        <div class="event-header">
                            <div class="event-info">
                                <h3 class="event-title">${event.title}</h3>
                                <p class="event-date">${dateStr} at ${timeStr}</p>
                            </div>
                            <button class="btn-delete" onclick="deleteEvent(${event.id})">✕</button>
                        </div>

                        ${event.description ? `<p class="event-description">${event.description}</p>` : ''}

                        <div class="countdown">
                            <div class="countdown-label">
                                ${expired ? '⏰ This event has passed' : '⏳ Time remaining'}
                            </div>
                            <div class="countdown-grid">
                                <div class="countdown-item">
                                    <span class="countdown-value">${expired ? 0 : days}</span>
                                    <span class="countdown-unit">Days</span>
                                </div>
                                <div class="countdown-item">
                                    <span class="countdown-value">${expired ? 0 : hours}</span>
                                    <span class="countdown-unit">Hours</span>
                                </div>
                                <div class="countdown-item">
                                    <span class="countdown-value">${expired ? 0 : minutes}</span>
                                    <span class="countdown-unit">Minutes</span>
                                </div>
                                <div class="countdown-item">
                                    <span class="countdown-value">${expired ? 0 : seconds}</span>
                                    <span class="countdown-unit">Seconds</span>
                                </div>
                            </div>
                        </div>

                        <div class="event-status ${expired ? 'status-expired' : 'status-active'}">
                            ${expired ? '✓ Completed' : '● Upcoming'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Update countdowns every second
        setInterval(() => {
            renderEvents();
        }, 1000);

        // Initial render
        renderEvents();
    </script>
</body>
</html>
