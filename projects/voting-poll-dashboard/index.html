<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting Poll Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .create-vote-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            height: fit-content;
        }

        .card-title {
            color: #333;
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .options-group {
            margin-bottom: 20px;
        }

        .option-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .option-input-group input {
            flex: 1;
        }

        .btn-remove {
            padding: 10px 15px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-remove:hover {
            background: #ff5252;
        }

        .btn-add-option {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .btn-add-option:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .btn-create-vote {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-create-vote:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .polls-section {
            display: grid;
            gap: 20px;
        }

        .poll-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .poll-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .poll-info h3 {
            color: #333;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .poll-meta {
            color: #999;
            font-size: 0.85rem;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-delete:hover {
            background: #ff5252;
        }

        .options-container {
            margin-bottom: 20px;
        }

        .option {
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option:hover {
            transform: translateX(5px);
        }

        .option-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .option-name {
            word-break: break-word;
        }

        .option-stats {
            color: #667eea;
            font-weight: 700;
        }

        .progress-bar {
            height: 30px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
            transition: all 0.3s ease;
        }

        .progress-bar:hover {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
        }

        .progress-text {
            padding: 5px 12px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            line-height: 30px;
        }

        .poll-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            color: #999;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #333;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .empty-state {
            background: white;
            border-radius: 20px;
            padding: 60px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .empty-state-text {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .empty-state-subtext {
            color: #999;
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .create-vote-card {
                height: auto;
            }

            .poll-stats {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗳️ Voting Poll Dashboard</h1>
            <p class="subtitle">Real-time voting with live results</p>
        </div>

        <div class="dashboard-grid">
            <div class="create-vote-card">
                <h2 class="card-title">Create Vote</h2>
                <form id="voteForm">
                    <div class="form-group">
                        <label for="voteTitle">Vote Title *</label>
                        <input type="text" id="voteTitle" placeholder="What should we do next?" required>
                    </div>

                    <div class="form-group">
                        <label for="voteDescription">Description</label>
                        <textarea id="voteDescription" placeholder="Add context..."></textarea>
                    </div>

                    <div class="options-group">
                        <label>Options *</label>
                        <div id="optionsContainer">
                            <div class="option-input-group">
                                <input type="text" class="vote-option" placeholder="Option 1" required>
                                <button type="button" class="btn-remove" onclick="removeOption(this)">✕</button>
                            </div>
                            <div class="option-input-group">
                                <input type="text" class="vote-option" placeholder="Option 2" required>
                                <button type="button" class="btn-remove" onclick="removeOption(this)">✕</button>
                            </div>
                        </div>
                        <button type="button" class="btn-add-option" onclick="addOption()">+ Add Option</button>
                    </div>

                    <button type="submit" class="btn-create-vote">Create Vote</button>
                </form>
            </div>

            <div class="polls-section" id="pollsContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">🗳️</div>
                    <div class="empty-state-text">No votes yet</div>
                    <div class="empty-state-subtext">Create your first vote to get started!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let votes = JSON.parse(localStorage.getItem('votes')) || [];

        const voteForm = document.getElementById('voteForm');
        const pollsContainer = document.getElementById('pollsContainer');

        voteForm.addEventListener('submit', (e) => {
            e.preventDefault();
            createVote();
        });

        function addOption() {
            const container = document.getElementById('optionsContainer');
            const optionCount = container.children.length;
            const div = document.createElement('div');
            div.className = 'option-input-group';
            div.innerHTML = `
                <input type="text" class="vote-option" placeholder="Option ${optionCount + 1}">
                <button type="button" class="btn-remove" onclick="removeOption(this)">✕</button>
            `;
            container.appendChild(div);
        }

        function removeOption(btn) {
            btn.parentElement.remove();
        }

        function createVote() {
            const title = document.getElementById('voteTitle').value;
            const description = document.getElementById('voteDescription').value;
            const options = Array.from(document.querySelectorAll('.vote-option'))
                .map(input => input.value)
                .filter(val => val.trim());

            if (options.length < 2) {
                alert('Please add at least 2 options');
                return;
            }

            const vote = {
                id: Date.now(),
                title,
                description,
                options: options.map(text => ({
                    text,
                    votes: 0
                })),
                totalVotes: 0,
                createdAt: new Date().toLocaleDateString(),
                endTime: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toLocaleDateString()
            };

            votes.unshift(vote);
            saveVotes();
            renderVotes();
            voteForm.reset();

            document.getElementById('optionsContainer').innerHTML = `
                <div class="option-input-group">
                    <input type="text" class="vote-option" placeholder="Option 1" required>
                    <button type="button" class="btn-remove" onclick="removeOption(this)">✕</button>
                </div>
                <div class="option-input-group">
                    <input type="text" class="vote-option" placeholder="Option 2" required>
                    <button type="button" class="btn-remove" onclick="removeOption(this)">✕</button>
                </div>
            `;
        }

        function vote(voteId, optionIndex) {
            const vote = votes.find(v => v.id === voteId);
            if (vote) {
                vote.options[optionIndex].votes++;
                vote.totalVotes++;
                saveVotes();
                renderVotes();
            }
        }

        function deleteVote(voteId) {
            if (confirm('Delete this vote?')) {
                votes = votes.filter(v => v.id !== voteId);
                saveVotes();
                renderVotes();
            }
        }

        function renderVotes() {
            if (votes.length === 0) {
                pollsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🗳️</div>
                        <div class="empty-state-text">No votes yet</div>
                        <div class="empty-state-subtext">Create your first vote to get started!</div>
                    </div>
                `;
                return;
            }

            pollsContainer.innerHTML = votes.map(vote => `
                <div class="poll-card">
                    <div class="poll-header">
                        <div class="poll-info">
                            <h3>${vote.title}</h3>
                            <p class="poll-meta">Created: ${vote.createdAt} • Ends: ${vote.endTime}</p>
                        </div>
                        <button class="btn-delete" onclick="deleteVote(${vote.id})">Delete</button>
                    </div>

                    ${vote.description ? `<p style="color: #666; margin-bottom: 20px;">${vote.description}</p>` : ''}

                    <div class="options-container">
                        ${vote.options.map((option, index) => {
                            const percentage = vote.totalVotes === 0 ? 0 : ((option.votes / vote.totalVotes) * 100).toFixed(1);
                            return `
                                <div class="option" onclick="vote(${vote.id}, ${index})">
                                    <div class="option-label">
                                        <span class="option-name">${option.text}</span>
                                        <span class="option-stats">${percentage}%</span>
                                    </div>
                                    <div class="progress-bar" style="width: ${Math.max(percentage, 5)}%">
                                        <div class="progress-text">${option.votes} vote${option.votes !== 1 ? 's' : ''}</div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <div class="poll-stats">
                        <div class="stat-item">
                            <div class="stat-label">Total Votes</div>
                            <div class="stat-value">${vote.totalVotes}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Options</div>
                            <div class="stat-value">${vote.options.length}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Leading</div>
                            <div class="stat-value">${vote.options.length > 0 ? vote.options.reduce((max, opt) => opt.votes > max.votes ? opt : max).text.substring(0, 10) : 'N/A'}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function saveVotes() {
            localStorage.setItem('votes', JSON.stringify(votes));
        }

        renderVotes();
    </script>
</body>
</html>
