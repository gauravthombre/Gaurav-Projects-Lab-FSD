<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Image Compressor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            margin-bottom: 30px;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #f0f1ff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .upload-subtext {
            color: #999;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        .settings {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .setting-item {
            margin-bottom: 15px;
        }

        .setting-item:last-child {
            margin-bottom: 0;
        }

        .setting-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #ddd;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: #764ba2;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #667eea;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
        }

        input[type="range"]::-moz-range-thumb:hover {
            background: #764ba2;
        }

        .image-preview {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }

        .image-preview.active {
            display: block;
        }

        .preview-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }

        .preview-item {
            text-align: center;
        }

        .preview-item img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .preview-label {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .file-size {
            color: #667eea;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .size-comparison {
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .size-stat {
            text-align: center;
        }

        .size-stat-label {
            color: #999;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .size-stat-value {
            color: #333;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .compression-ratio {
            color: #4caf50;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-compress {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-compress:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-compress:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-download {
            background: #4caf50;
            color: white;
        }

        .btn-download:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-reset {
            background: #999;
            color: white;
        }

        .btn-reset:hover {
            background: #777;
            transform: translateY(-2px);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: 600;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f0f1ff;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .preview-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image Compressor</h1>
        <p class="subtitle">Compress images while maintaining quality</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📤</div>
            <div class="upload-text">Click or drag images here</div>
            <div class="upload-subtext">PNG, JPG, WebP (Max 50MB)</div>
        </div>

        <input type="file" id="fileInput" accept="image/*" multiple>

        <div class="settings">
            <div class="setting-item">
                <div class="setting-label">
                    <span>Quality Level</span>
                    <span id="qualityValue">80%</span>
                </div>
                <input type="range" id="qualityRange" min="10" max="100" value="80">
            </div>

            <div class="setting-item">
                <div class="setting-label">
                    <span>Max Width</span>
                    <span id="widthValue">Original</span>
                </div>
                <input type="range" id="widthRange" min="0" max="2000" value="0" step="100">
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span>Compressing image...</span>
        </div>

        <div class="image-preview" id="imagePreview">
            <div class="preview-title">Preview</div>
            <div class="preview-grid">
                <div class="preview-item">
                    <div class="preview-label">Original</div>
                    <img id="originalImage" alt="Original">
                    <div class="file-size" id="originalSize">0 KB</div>
                </div>
                <div class="preview-item">
                    <div class="preview-label">Compressed</div>
                    <img id="compressedImage" alt="Compressed">
                    <div class="file-size" id="compressedSize">0 KB</div>
                </div>
            </div>
            <div class="size-comparison">
                <div class="size-stat">
                    <div class="size-stat-label">Saved</div>
                    <div class="size-stat-value compression-ratio" id="savedSize">0 KB</div>
                </div>
                <div class="size-stat">
                    <div class="size-stat-label">Reduction</div>
                    <div class="size-stat-value compression-ratio" id="reduction">0%</div>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-compress" id="compressBtn">Compress</button>
            <button class="btn-download" id="downloadBtn" style="display:none;">Download</button>
            <button class="btn-reset" id="resetBtn">Reset</button>
        </div>
    </div>

    <script>
        let originalFile = null;
        let compressedCanvas = null;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const qualityRange = document.getElementById('qualityRange');
        const widthRange = document.getElementById('widthRange');
        const compressBtn = document.getElementById('compressBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const preview = document.getElementById('imagePreview');
        const loading = document.getElementById('loading');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        qualityRange.addEventListener('input', (e) => {
            document.getElementById('qualityValue').textContent = e.target.value + '%';
        });

        widthRange.addEventListener('input', (e) => {
            if (e.target.value === '0') {
                document.getElementById('widthValue').textContent = 'Original';
            } else {
                document.getElementById('widthValue').textContent = e.target.value + 'px';
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file');
                return;
            }

            originalFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    document.getElementById('originalImage').src = img.src;
                    document.getElementById('originalSize').textContent = formatFileSize(file.size);
                    preview.classList.add('active');
                    downloadBtn.style.display = 'none';
                    compressBtn.disabled = false;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        compressBtn.addEventListener('click', () => {
            if (!originalFile) {
                alert('Please select an image first');
                return;
            }

            loading.classList.add('active');
            compressBtn.disabled = true;

            setTimeout(() => {
                compressImage();
                loading.classList.remove('active');
                compressBtn.disabled = false;
                downloadBtn.style.display = 'flex';
            }, 500);
        });

        function compressImage() {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;

                const maxWidth = parseInt(widthRange.value);
                if (maxWidth > 0 && width > maxWidth) {
                    height = (height * maxWidth) / width;
                    width = maxWidth;
                }

                canvas.width = width;
                canvas.height = height;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                const quality = parseInt(qualityRange.value) / 100;
                compressedCanvas = canvas;

                canvas.toBlob((blob) => {
                    document.getElementById('compressedImage').src = canvas.toDataURL('image/jpeg', quality);
                    const compressedSize = blob.size;
                    const originalSize = originalFile.size;
                    const saved = originalSize - compressedSize;
                    const reduction = ((saved / originalSize) * 100).toFixed(1);

                    document.getElementById('compressedSize').textContent = formatFileSize(compressedSize);
                    document.getElementById('savedSize').textContent = formatFileSize(saved);
                    document.getElementById('reduction').textContent = reduction + '%';
                }, 'image/jpeg', quality);
            };

            const reader = new FileReader();
            reader.onload = (e) => {
                img.src = e.target.result;
            };
            reader.readAsDataURL(originalFile);
        }

        downloadBtn.addEventListener('click', () => {
            if (!compressedCanvas) return;

            const quality = parseInt(qualityRange.value) / 100;
            compressedCanvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'compressed-' + originalFile.name;
                a.click();
                URL.revokeObjectURL(url);
            }, 'image/jpeg', quality);
        });

        resetBtn.addEventListener('click', () => {
            originalFile = null;
            compressedCanvas = null;
            fileInput.value = '';
            preview.classList.remove('active');
            downloadBtn.style.display = 'none';
            qualityRange.value = 80;
            widthRange.value = 0;
            document.getElementById('qualityValue').textContent = '80%';
            document.getElementById('widthValue').textContent = 'Original';
        });

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }
    </script>
</body>
</html>
