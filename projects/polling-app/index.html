<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Polling App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }

        .create-poll-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .card-title {
            color: #333;
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        .options-group {
            margin-bottom: 20px;
        }

        .option-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .option-input-group input {
            flex: 1;
        }

        .btn-remove-option {
            padding: 10px 15px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-remove-option:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        .btn-add-option {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .btn-add-option:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .btn-create-poll {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-create-poll:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .polls-section {
            display: grid;
            gap: 20px;
        }

        .poll-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .poll-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .poll-title {
            color: #333;
            font-size: 1.3rem;
            font-weight: 600;
            flex: 1;
            word-break: break-word;
            margin-right: 10px;
        }

        .poll-meta {
            color: #999;
            font-size: 0.85rem;
        }

        .btn-delete-poll {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-delete-poll:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        .poll-description {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .poll-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 15px;
        }

        .option-item {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-item:hover .option-bar {
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .option-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .option-label-text {
            word-break: break-word;
            flex: 1;
        }

        .option-percentage {
            color: #667eea;
            font-weight: 700;
            margin-left: 10px;
        }

        .option-bar {
            height: 25px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
            transition: all 0.3s ease;
        }

        .option-bar.voted {
            background: linear-gradient(90deg, #4caf50 0%, #45a049 100%);
        }

        .option-votes {
            padding: 3px 10px;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 25px;
        }

        .poll-stats {
            display: flex;
            justify-content: space-between;
            padding-top: 15px;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 0.9rem;
        }

        .empty-state {
            background: white;
            border-radius: 20px;
            padding: 60px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .empty-state-text {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .empty-state-subtext {
            color: #999;
            font-size: 0.95rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .create-poll-card,
            .poll-card {
                padding: 20px;
            }

            .poll-header {
                flex-direction: column;
            }

            .poll-title {
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Polling App</h1>
            <p class="subtitle">Create polls and get instant feedback</p>
        </div>

        <div class="create-poll-card">
            <h2 class="card-title">Create New Poll</h2>
            <form id="pollForm">
                <div class="form-group">
                    <label for="pollTitle">Poll Title *</label>
                    <input type="text" id="pollTitle" placeholder="What's your favorite programming language?" required>
                </div>

                <div class="form-group">
                    <label for="pollDescription">Description (Optional)</label>
                    <textarea id="pollDescription" placeholder="Add more context..."></textarea>
                </div>

                <div class="options-group">
                    <label>Poll Options *</label>
                    <div id="optionsContainer">
                        <div class="option-input-group">
                            <input type="text" class="poll-option" placeholder="Option 1" required>
                            <button type="button" class="btn-remove-option" onclick="removeOption(this)">✕</button>
                        </div>
                        <div class="option-input-group">
                            <input type="text" class="poll-option" placeholder="Option 2" required>
                            <button type="button" class="btn-remove-option" onclick="removeOption(this)">✕</button>
                        </div>
                    </div>
                    <button type="button" class="btn-add-option" onclick="addOption()">+ Add Option</button>
                </div>

                <button type="submit" class="btn-create-poll">Create Poll</button>
            </form>
        </div>

        <div class="polls-section" id="pollsContainer">
            <div class="empty-state">
                <div class="empty-state-icon">📋</div>
                <div class="empty-state-text">No polls yet</div>
                <div class="empty-state-subtext">Create your first poll above!</div>
            </div>
        </div>
    </div>

    <script>
        let polls = JSON.parse(localStorage.getItem('polls')) || [];

        const pollForm = document.getElementById('pollForm');
        const pollsContainer = document.getElementById('pollsContainer');

        pollForm.addEventListener('submit', (e) => {
            e.preventDefault();
            createPoll();
        });

        function addOption() {
            const container = document.getElementById('optionsContainer');
            const optionCount = container.children.length;
            const div = document.createElement('div');
            div.className = 'option-input-group';
            div.innerHTML = `
                <input type="text" class="poll-option" placeholder="Option ${optionCount + 1}">
                <button type="button" class="btn-remove-option" onclick="removeOption(this)">✕</button>
            `;
            container.appendChild(div);
        }

        function removeOption(btn) {
            btn.parentElement.remove();
        }

        function createPoll() {
            const title = document.getElementById('pollTitle').value;
            const description = document.getElementById('pollDescription').value;
            const options = Array.from(document.querySelectorAll('.poll-option'))
                .map(input => input.value)
                .filter(val => val.trim());

            if (options.length < 2) {
                alert('Please add at least 2 options');
                return;
            }

            const poll = {
                id: Date.now(),
                title,
                description,
                options: options.map(text => ({
                    text,
                    votes: 0
                })),
                totalVotes: 0,
                createdAt: new Date().toLocaleDateString()
            };

            polls.unshift(poll);
            savePolls();
            renderPolls();
            pollForm.reset();

            // Reset options to default
            const container = document.getElementById('optionsContainer');
            container.innerHTML = `
                <div class="option-input-group">
                    <input type="text" class="poll-option" placeholder="Option 1" required>
                    <button type="button" class="btn-remove-option" onclick="removeOption(this)">✕</button>
                </div>
                <div class="option-input-group">
                    <input type="text" class="poll-option" placeholder="Option 2" required>
                    <button type="button" class="btn-remove-option" onclick="removeOption(this)">✕</button>
                </div>
            `;
        }

        function vote(pollId, optionIndex) {
            const poll = polls.find(p => p.id === pollId);
            if (poll) {
                poll.options[optionIndex].votes++;
                poll.totalVotes++;
                savePolls();
                renderPolls();
            }
        }

        function deletePoll(pollId) {
            if (confirm('Delete this poll?')) {
                polls = polls.filter(p => p.id !== pollId);
                savePolls();
                renderPolls();
            }
        }

        function renderPolls() {
            if (polls.length === 0) {
                pollsContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div class="empty-state-text">No polls yet</div>
                        <div class="empty-state-subtext">Create your first poll above!</div>
                    </div>
                `;
                return;
            }

            pollsContainer.innerHTML = polls.map(poll => `
                <div class="poll-card">
                    <div class="poll-header">
                        <div>
                            <h3 class="poll-title">${poll.title}</h3>
                            <p class="poll-meta">Created on ${poll.createdAt}</p>
                        </div>
                        <button class="btn-delete-poll" onclick="deletePoll(${poll.id})">Delete</button>
                    </div>

                    ${poll.description ? `<p class="poll-description">${poll.description}</p>` : ''}

                    <div class="poll-options">
                        ${poll.options.map((option, index) => {
                            const percentage = poll.totalVotes === 0 ? 0 : ((option.votes / poll.totalVotes) * 100).toFixed(1);
                            return `
                                <div class="option-item" onclick="vote(${poll.id}, ${index})">
                                    <div class="option-label">
                                        <span class="option-label-text">${option.text}</span>
                                        <span class="option-percentage">${percentage}%</span>
                                    </div>
                                    <div class="option-bar" style="width: ${Math.max(percentage, 5)}%">
                                        <div class="option-votes">${option.votes} vote${option.votes !== 1 ? 's' : ''}</div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>

                    <div class="poll-stats">
                        <span>Total Votes: <strong>${poll.totalVotes}</strong></span>
                        <span>Options: <strong>${poll.options.length}</strong></span>
                    </div>
                </div>
            `).join('');
        }

        function savePolls() {
            localStorage.setItem('polls', JSON.stringify(polls));
        }

        renderPolls();
    </script>
</body>
</html>
