<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Resource Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-box,
        .filter-select {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            background: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            width: 300px;
        }

        .search-box:focus,
        .filter-select:focus {
            outline: none;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-add {
            padding: 12px 25px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .resources-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .resource-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .resource-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .resource-header {
            padding: 20px;
            border-bottom: 3px solid;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .resource-card.course .resource-header {
            border-bottom-color: #667eea;
            background: linear-gradient(135deg, #667eea15, transparent);
        }

        .resource-card.article .resource-header {
            border-bottom-color: #4caf50;
            background: linear-gradient(135deg, #4caf5015, transparent);
        }

        .resource-card.video .resource-header {
            border-bottom-color: #ff6b6b;
            background: linear-gradient(135deg, #ff6b6b15, transparent);
        }

        .resource-card.document .resource-header {
            border-bottom-color: #ffa502;
            background: linear-gradient(135deg, #ffa50215, transparent);
        }

        .resource-title {
            color: #333;
            font-size: 1.1rem;
            font-weight: 700;
            word-break: break-word;
            flex: 1;
        }

        .resource-type {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .resource-card.course .resource-type {
            background: #667eea;
            color: white;
        }

        .resource-card.article .resource-type {
            background: #4caf50;
            color: white;
        }

        .resource-card.video .resource-type {
            background: #ff6b6b;
            color: white;
        }

        .resource-card.document .resource-type {
            background: #ffa502;
            color: white;
        }

        .resource-body {
            padding: 20px;
        }

        .resource-category {
            color: #999;
            font-size: 0.85rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .resource-description {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .resource-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .meta-item {
            font-size: 0.85rem;
            color: #999;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .progress-bar {
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 3px;
        }

        .resource-actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-view {
            background: #667eea;
            color: white;
        }

        .btn-view:hover {
            background: #764ba2;
        }

        .btn-complete {
            background: #4caf50;
            color: white;
        }

        .btn-complete:hover {
            background: #45a049;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
        }

        .btn-delete:hover {
            background: #ff5252;
        }

        .empty-state {
            background: white;
            border-radius: 20px;
            padding: 80px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .empty-state-text {
            color: #666;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .empty-state-subtext {
            color: #999;
            font-size: 1rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-save {
            flex: 1;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-cancel {
            flex: 1;
            padding: 15px;
            background: #ccc;
            color: #333;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .resources-grid {
                grid-template-columns: 1fr;
            }

            .search-box {
                width: 100%;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .btn-add {
                width: 100%;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Learning Resource Hub</h1>
            <p class="subtitle">Organize and track your learning materials</p>
        </div>

        <div class="controls">
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search resources...">
            <select class="filter-select" id="filterSelect">
                <option value="">All Types</option>
                <option value="course">Courses</option>
                <option value="article">Articles</option>
                <option value="video">Videos</option>
                <option value="document">Documents</option>
            </select>
            <button class="btn-add" id="addBtn">+ Add Resource</button>
        </div>

        <div class="resources-grid" id="resourcesGrid">
            <div class="empty-state">
                <div class="empty-state-icon">📚</div>
                <div class="empty-state-text">No resources yet</div>
                <div class="empty-state-subtext">Add your first learning resource to get started!</div>
            </div>
        </div>
    </div>

    <div class="modal" id="resourceModal">
        <div class="modal-content">
            <h2 class="modal-title">Add Learning Resource</h2>
            <form id="resourceForm">
                <div class="form-group">
                    <label for="resourceTitle">Title *</label>
                    <input type="text" id="resourceTitle" placeholder="Resource title" required>
                </div>

                <div class="form-group">
                    <label for="resourceType">Type *</label>
                    <select id="resourceType" required>
                        <option value="course">Course</option>
                        <option value="article">Article</option>
                        <option value="video">Video</option>
                        <option value="document">Document</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="resourceCategory">Category *</label>
                    <input type="text" id="resourceCategory" placeholder="e.g., Web Development" required>
                </div>

                <div class="form-group">
                    <label for="resourceDescription">Description</label>
                    <textarea id="resourceDescription" placeholder="What is this resource about?"></textarea>
                </div>

                <div class="form-group">
                    <label for="resourceLink">Link (Optional)</label>
                    <input type="text" id="resourceLink" placeholder="https://example.com">
                </div>

                <div class="form-group">
                    <label for="resourceProgress">Progress (0-100) *</label>
                    <input type="text" id="resourceProgress" value="0" placeholder="0" required>
                </div>

                <div class="modal-buttons">
                    <button type="submit" class="btn-save">Add Resource</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let resources = JSON.parse(localStorage.getItem('resources')) || [];
        let editingId = null;

        const modal = document.getElementById('resourceModal');
        const form = document.getElementById('resourceForm');
        const searchInput = document.getElementById('searchInput');
        const filterSelect = document.getElementById('filterSelect');
        const addBtn = document.getElementById('addBtn');
        const resourcesGrid = document.getElementById('resourcesGrid');

        addBtn.addEventListener('click', () => openModal());
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            saveResource();
        });
        searchInput.addEventListener('input', renderResources);
        filterSelect.addEventListener('change', renderResources);

        function openModal(id = null) {
            editingId = id;
            form.reset();

            if (id) {
                const resource = resources.find(r => r.id === id);
                document.querySelector('.modal-title').textContent = 'Edit Resource';
                document.getElementById('resourceTitle').value = resource.title;
                document.getElementById('resourceType').value = resource.type;
                document.getElementById('resourceCategory').value = resource.category;
                document.getElementById('resourceDescription').value = resource.description;
                document.getElementById('resourceLink').value = resource.link;
                document.getElementById('resourceProgress').value = resource.progress;
            } else {
                document.querySelector('.modal-title').textContent = 'Add Learning Resource';
            }

            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
            editingId = null;
        }

        function saveResource() {
            const resource = {
                title: document.getElementById('resourceTitle').value,
                type: document.getElementById('resourceType').value,
                category: document.getElementById('resourceCategory').value,
                description: document.getElementById('resourceDescription').value,
                link: document.getElementById('resourceLink').value,
                progress: parseInt(document.getElementById('resourceProgress').value) || 0
            };

            if (editingId) {
                const idx = resources.findIndex(r => r.id === editingId);
                resources[idx] = { ...resources[idx], ...resource };
            } else {
                resources.unshift({
                    id: Date.now(),
                    ...resource,
                    createdAt: new Date().toLocaleDateString()
                });
            }

            saveResources();
            renderResources();
            closeModal();
        }

        function deleteResource(id) {
            if (confirm('Delete this resource?')) {
                resources = resources.filter(r => r.id !== id);
                saveResources();
                renderResources();
            }
        }

        function updateProgress(id, newProgress) {
            const resource = resources.find(r => r.id === id);
            if (resource) {
                resource.progress = Math.min(100, resource.progress + newProgress);
                saveResources();
                renderResources();
            }
        }

        function renderResources() {
            const searchTerm = searchInput.value.toLowerCase();
            const filterType = filterSelect.value;

            let filtered = resources.filter(r => {
                const matchesSearch = r.title.toLowerCase().includes(searchTerm) ||
                                    r.category.toLowerCase().includes(searchTerm) ||
                                    r.description.toLowerCase().includes(searchTerm);
                const matchesFilter = !filterType || r.type === filterType;
                return matchesSearch && matchesFilter;
            });

            if (filtered.length === 0) {
                resourcesGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <div class="empty-state-text">No resources found</div>
                        <div class="empty-state-subtext">Try a different search or add a new resource!</div>
                    </div>
                `;
                return;
            }

            resourcesGrid.innerHTML = filtered.map(resource => `
                <div class="resource-card ${resource.type}">
                    <div class="resource-header">
                        <div>
                            <h3 class="resource-title">${resource.title}</h3>
                            <p class="resource-category">${resource.category}</p>
                        </div>
                        <span class="resource-type">${resource.type}</span>
                    </div>
                    <div class="resource-body">
                        <p class="resource-description">${resource.description}</p>
                        <div class="resource-meta">
                            <span class="meta-item">📅 ${resource.createdAt}</span>
                            <span class="meta-item">⏱️ ${resource.progress}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${resource.progress}%"></div>
                        </div>
                        <div class="resource-actions">
                            <button class="btn-action btn-view" onclick="openModal(${resource.id})">Edit</button>
                            <button class="btn-action btn-complete" onclick="updateProgress(${resource.id}, 10)">+10%</button>
                            <button class="btn-action btn-delete" onclick="deleteResource(${resource.id})">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function saveResources() {
            localStorage.setItem('resources', JSON.stringify(resources));
        }

        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        renderResources();
    </script>
</body>
</html>
