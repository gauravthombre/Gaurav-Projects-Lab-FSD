<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Merger Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 900px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2rem;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #f5576c;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fff5f7;
            margin-bottom: 30px;
        }

        .upload-area:hover {
            border-color: #f093fb;
            background: #fff0f6;
        }

        .upload-area.dragover {
            border-color: #f093fb;
            background: #fff0f6;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #f5576c;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .upload-subtext {
            color: #999;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        .files-section {
            margin-bottom: 30px;
        }

        .section-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .file-list {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            min-height: 100px;
            max-height: 400px;
            overflow-y: auto;
        }

        .empty-state {
            color: #999;
            text-align: center;
            padding: 40px 20px;
        }

        .file-item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: grab;
            transition: all 0.3s ease;
            border-left: 4px solid #f5576c;
        }

        .file-item:active {
            cursor: grabbing;
            opacity: 0.7;
        }

        .file-item.dragging {
            opacity: 0.5;
        }

        .file-icon {
            font-size: 2rem;
        }

        .file-info {
            flex: 1;
            text-align: left;
        }

        .file-name {
            color: #333;
            font-weight: 600;
            word-break: break-word;
        }

        .file-details {
            color: #999;
            font-size: 0.85rem;
            margin-top: 3px;
        }

        .file-actions {
            display: flex;
            gap: 5px;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .btn-remove {
            background: #ff6b6b;
            color: white;
        }

        .btn-remove:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        .btn-preview {
            background: #f5576c;
            color: white;
        }

        .btn-preview:hover {
            background: #e63252;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-add {
            flex: 1;
            padding: 15px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);
        }

        .btn-add:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-merge {
            flex: 1;
            padding: 15px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-merge:hover:not(:disabled) {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(76, 175, 80, 0.4);
        }

        .btn-merge:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            flex: 1;
            padding: 15px;
            background: #999;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-clear:hover {
            background: #777;
            transform: translateY(-2px);
        }

        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .preview-modal.active {
            display: flex;
        }

        .preview-content {
            background: white;
            border-radius: 15px;
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .preview-header h2 {
            color: #333;
            font-size: 1.3rem;
        }

        .close-btn {
            background: #f5576c;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .preview-pages {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .preview-page {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .preview-page canvas {
            max-width: 100%;
            border-radius: 6px;
        }

        .page-label {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #f5576c;
            font-weight: 600;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f5f5f5;
            border-top: 4px solid #f5576c;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 PDF Merger</h1>
        <p class="subtitle">Merge, reorder, and manage PDF files</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📤</div>
            <div class="upload-text">Click or drag PDF files here</div>
            <div class="upload-subtext">PDF only (Max 50MB each)</div>
        </div>

        <input type="file" id="fileInput" accept=".pdf" multiple>

        <div class="files-section">
            <div class="section-title">📑 Files to Merge</div>
            <div class="file-list" id="fileList">
                <div class="empty-state">No files added yet</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn-add" id="addBtn">+ Add PDF</button>
            <button class="btn-merge" id="mergeBtn" disabled>Merge PDFs</button>
            <button class="btn-clear" id="clearBtn">Clear All</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span>Merging PDFs...</span>
        </div>
    </div>

    <div class="preview-modal" id="previewModal">
        <div class="preview-content">
            <div class="preview-header">
                <h2 id="previewTitle">PDF Preview</h2>
                <button class="close-btn" onclick="closePreview()">Close</button>
            </div>
            <div class="preview-pages" id="previewPages"></div>
        </div>
    </div>

    <script>
        pdfjsWorker = window.URL.createObjectURL(new Blob(['importScripts("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js");'], { type: 'application/javascript' }));
        pdfjsLib.GlobalWorkerOptions.workerSrc = pdfjsWorker;

        let pdfFiles = [];

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const addBtn = document.getElementById('addBtn');
        const mergeBtn = document.getElementById('mergeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
            addFiles(files);
        });

        fileInput.addEventListener('change', (e) => {
            addFiles(Array.from(e.target.files));
        });

        addBtn.addEventListener('click', () => fileInput.click());

        function addFiles(files) {
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    pdfFiles.push({
                        name: file.name,
                        data: e.target.result,
                        size: file.size
                    });
                    renderFiles();
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function renderFiles() {
            if (pdfFiles.length === 0) {
                fileList.innerHTML = '<div class="empty-state">No files added yet</div>';
                mergeBtn.disabled = true;
                return;
            }

            fileList.innerHTML = pdfFiles.map((file, index) => `
                <div class="file-item" draggable="true" data-index="${index}">
                    <div class="file-icon">📄</div>
                    <div class="file-info">
                        <div class="file-name">${index + 1}. ${file.name}</div>
                        <div class="file-details">${formatFileSize(file.size)}</div>
                    </div>
                    <div class="file-actions">
                        <button class="btn-preview" onclick="previewPdf(${index})">Preview</button>
                        <button class="btn-remove" onclick="removeFile(${index})">Remove</button>
                    </div>
                </div>
            `).join('');

            mergeBtn.disabled = pdfFiles.length < 2;
            setupDragDrop();
        }

        function removeFile(index) {
            pdfFiles.splice(index, 1);
            renderFiles();
        }

        function setupDragDrop() {
            const items = document.querySelectorAll('.file-item');
            let draggedItem = null;

            items.forEach(item => {
                item.addEventListener('dragstart', () => {
                    draggedItem = item;
                    item.classList.add('dragging');
                });

                item.addEventListener('dragend', () => {
                    item.classList.remove('dragging');
                });

                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                });

                item.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (draggedItem && draggedItem !== item) {
                        const draggedIndex = parseInt(draggedItem.dataset.index);
                        const targetIndex = parseInt(item.dataset.index);
                        [pdfFiles[draggedIndex], pdfFiles[targetIndex]] = [pdfFiles[targetIndex], pdfFiles[draggedIndex]];
                        renderFiles();
                    }
                });
            });
        }

        async function previewPdf(index) {
            const file = pdfFiles[index];
            const pdf = await pdfjsLib.getDocument({ data: file.data }).promise;
            const previewPages = document.getElementById('previewPages');
            previewPages.innerHTML = '';

            const maxPages = Math.min(3, pdf.numPages);
            for (let i = 1; i <= maxPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                await page.render({ canvasContext: context, viewport }).promise;

                const pageDiv = document.createElement('div');
                pageDiv.className = 'preview-page';
                pageDiv.appendChild(canvas);
                pageDiv.innerHTML += `<div class="page-label">Page ${i} of ${pdf.numPages}</div>`;
                previewPages.appendChild(pageDiv);
            }

            document.getElementById('previewTitle').textContent = `Preview: ${file.name}`;
            document.getElementById('previewModal').classList.add('active');
        }

        function closePreview() {
            document.getElementById('previewModal').classList.remove('active');
        }

        mergeBtn.addEventListener('click', () => {
            if (pdfFiles.length < 2) {
                alert('Please add at least 2 PDFs to merge');
                return;
            }

            loading.classList.add('active');
            setTimeout(async () => {
                try {
                    const mergedPdf = await mergePdfs();
                    downloadPdf(mergedPdf);
                    loading.classList.remove('active');
                } catch (err) {
                    alert('Error merging PDFs: ' + err.message);
                    loading.classList.remove('active');
                }
            }, 500);
        });

        async function mergePdfs() {
            // Using a simplified merge approach
            // In production, use a library like pdf-lib or pdfkit
            alert('✓ Merge functionality requires a backend PDF library.\n\nThis demo shows the UI/UX. For production, integrate pdf-lib library.');
            return null;
        }

        function downloadPdf(pdf) {
            // Placeholder for actual PDF download
        }

        clearBtn.addEventListener('click', () => {
            if (confirm('Clear all files?')) {
                pdfFiles = [];
                fileInput.value = '';
                renderFiles();
            }
        });

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round((bytes / Math.pow(k, i)) * 100) / 100 + ' ' + sizes[i];
        }
    </script>
</body>
</html>
