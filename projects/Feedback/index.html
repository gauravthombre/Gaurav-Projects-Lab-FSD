<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Collection System</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f0f4ff;min-height:100vh;padding:30px 16px}
.container{max-width:860px;margin:0 auto}
h1{text-align:center;font-size:2rem;font-weight:800;color:#1e1e3f;margin-bottom:4px}
.sub{text-align:center;color:#888;font-size:0.9rem;margin-bottom:2rem}

.tabs{display:flex;gap:0;background:#fff;border-radius:14px;padding:4px;box-shadow:0 2px 8px rgba(0,0,0,0.07);margin-bottom:2rem;overflow:hidden}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;border-radius:10px;font-size:0.9rem;font-weight:600;color:#999;transition:all 0.2s}
.tab.active{background:#4f46e5;color:#fff}

/* FORM */
.form-card{background:#fff;border-radius:20px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,0.07)}
.form-row{margin-bottom:18px}
label{display:block;font-size:0.85rem;font-weight:600;color:#555;margin-bottom:6px}
input[type=text],input[type=email],textarea,select{
  width:100%;padding:12px 16px;border-radius:12px;border:2px solid #eee;
  font-size:0.9rem;outline:none;font-family:inherit;
  background:#f8f9ff;transition:border-color 0.2s;
}
input:focus,textarea:focus,select:focus{border-color:#4f46e5}
textarea{resize:vertical;min-height:100px}
.star-row{display:flex;gap:8px;margin-top:4px}
.star{font-size:2rem;cursor:pointer;transition:transform 0.15s;opacity:0.3}
.star.active{opacity:1}
.star:hover{transform:scale(1.2)}
.category-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.cat-chip{padding:7px 16px;border-radius:50px;border:2px solid #eee;cursor:pointer;font-size:0.82rem;font-weight:600;transition:all 0.2s}
.cat-chip.selected{background:#4f46e5;color:#fff;border-color:#4f46e5}
.submit-btn{width:100%;padding:14px;background:#4f46e5;color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:background 0.2s;margin-top:8px}
.submit-btn:hover{background:#3730a3}
.success-msg{display:none;text-align:center;padding:20px;background:#e8f5e9;border-radius:12px;color:#2e7d32;font-weight:600;margin-top:16px}

/* DASHBOARD */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:1.5rem}
.stat-box{background:#fff;border-radius:14px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.stat-num{font-size:2rem;font-weight:800;margin-bottom:2px}
.stat-lbl{font-size:0.75rem;color:#aaa;text-transform:uppercase;letter-spacing:0.5px}

.feedback-list{display:flex;flex-direction:column;gap:12px}
.fb-card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,0.05);border-left:4px solid #4f46e5}
.fb-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.fb-name{font-weight:700;font-size:0.95rem}
.fb-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.fb-cat{font-size:0.75rem;padding:3px 10px;border-radius:50px;background:#e8eaf6;color:#3949ab;font-weight:600}
.fb-stars{font-size:0.85rem;color:#f59e0b}
.fb-date{font-size:0.75rem;color:#bbb}
.fb-text{font-size:0.87rem;color:#666;line-height:1.6}
.empty-dash{text-align:center;padding:40px;color:#bbb}
.clear-btn{margin-top:12px;padding:8px 20px;border:2px solid #fecaca;background:transparent;color:#ef4444;border-radius:50px;cursor:pointer;font-size:0.82rem;font-weight:600}
.clear-btn:hover{background:#fef2f2}

/* Chart */
.chart-section{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-bottom:1.5rem}
.chart-title{font-size:0.85rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:0.82rem;min-width:60px;color:#555;font-weight:600}
.bar-track{flex:1;background:#f0f0f0;border-radius:99px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:#4f46e5;transition:width 0.5s}
.bar-count{font-size:0.8rem;color:#888;min-width:20px}
</style>
</head>
<body>
<div class="container">
  <h1>📝 Feedback System</h1>
  <p class="sub">Share your experience and help us improve</p>

  <div class="tabs">
    <div class="tab active" onclick="showTab('form',this)">Submit Feedback</div>
    <div class="tab" onclick="showTab('dashboard',this)">Dashboard</div>
  </div>

  <!-- FORM TAB -->
  <div id="tab-form">
    <div class="form-card">
      <div class="form-row">
        <label>Your Name</label>
        <input type="text" id="fb-name" placeholder="Enter your name">
      </div>
      <div class="form-row">
        <label>Email Address</label>
        <input type="email" id="fb-email" placeholder="your@email.com">
      </div>
      <div class="form-row">
        <label>Category</label>
        <div class="category-row" id="cat-row">
          <div class="cat-chip" onclick="selectCat(this,'Product')">📦 Product</div>
          <div class="cat-chip" onclick="selectCat(this,'Service')">🛎️ Service</div>
          <div class="cat-chip" onclick="selectCat(this,'Support')">💬 Support</div>
          <div class="cat-chip" onclick="selectCat(this,'Website')">🌐 Website</div>
          <div class="cat-chip" onclick="selectCat(this,'Other')">📌 Other</div>
        </div>
      </div>
      <div class="form-row">
        <label>Your Rating</label>
        <div class="star-row" id="star-row">
          <span class="star" onclick="setRating(1)">★</span>
          <span class="star" onclick="setRating(2)">★</span>
          <span class="star" onclick="setRating(3)">★</span>
          <span class="star" onclick="setRating(4)">★</span>
          <span class="star" onclick="setRating(5)">★</span>
        </div>
      </div>
      <div class="form-row">
        <label>Your Feedback</label>
        <textarea id="fb-text" placeholder="Write your feedback here..."></textarea>
      </div>
      <button class="submit-btn" onclick="submitFeedback()">Submit Feedback →</button>
      <div class="success-msg" id="success-msg">✅ Thank you! Your feedback has been submitted.</div>
    </div>
  </div>

  <!-- DASHBOARD TAB -->
  <div id="tab-dashboard" style="display:none">
    <div class="stats-row" id="stats-row"></div>
    <div class="chart-section">
      <div class="chart-title">Rating Distribution</div>
      <div id="rating-chart"></div>
    </div>
    <div class="feedback-list" id="feedback-list"></div>
    <button class="clear-btn" onclick="clearAll()">🗑 Clear All Feedback</button>
  </div>
</div>

<script>
let feedbacks=[];let rating=0;let selectedCat='';
try{feedbacks=JSON.parse(localStorage.getItem('feedbacks_v1')||'[]');}catch(e){}

function save(){localStorage.setItem('feedbacks_v1',JSON.stringify(feedbacks));}
function showTab(t,btn){
  document.getElementById('tab-form').style.display=t==='form'?'block':'none';
  document.getElementById('tab-dashboard').style.display=t==='dashboard'?'block':'none';
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(t==='dashboard')renderDashboard();
}
function selectCat(el,cat){selectedCat=cat;document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('selected'));el.classList.add('selected');}
function setRating(n){
  rating=n;
  document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('active',i<n));
}

function submitFeedback(){
  const name=document.getElementById('fb-name').value.trim();
  const email=document.getElementById('fb-email').value.trim();
  const text=document.getElementById('fb-text').value.trim();
  if(!name||!text||!rating||!selectedCat){alert('Please fill name, category, rating, and feedback.');return;}
  feedbacks.unshift({name,email,cat:selectedCat,rating,text,date:new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})});
  save();
  document.getElementById('success-msg').style.display='block';
  document.getElementById('fb-name').value='';document.getElementById('fb-email').value='';
  document.getElementById('fb-text').value='';rating=0;selectedCat='';
  document.querySelectorAll('.star').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.cat-chip').forEach(c=>c.classList.remove('selected'));
  setTimeout(()=>document.getElementById('success-msg').style.display='none',3000);
}

function renderDashboard(){
  const total=feedbacks.length;
  const avg=total?feedbacks.reduce((s,f)=>s+f.rating,0)/total:0;
  const cats=[...new Set(feedbacks.map(f=>f.cat))];
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-box"><div class="stat-num" style="color:#4f46e5">${total}</div><div class="stat-lbl">Total Responses</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#f59e0b">${avg.toFixed(1)}★</div><div class="stat-lbl">Avg Rating</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#10b981">${cats.length}</div><div class="stat-lbl">Categories</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#ef4444">${feedbacks.filter(f=>f.rating<=2).length}</div><div class="stat-lbl">Negative</div></div>
  `;
  const dist=[5,4,3,2,1].map(r=>({r,c:feedbacks.filter(f=>f.rating===r).length}));
  const max=Math.max(...dist.map(d=>d.c),1);
  document.getElementById('rating-chart').innerHTML=dist.map(d=>`
    <div class="bar-row">
      <div class="bar-label">${'★'.repeat(d.r)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${d.c/max*100}%"></div></div>
      <div class="bar-count">${d.c}</div>
    </div>`).join('');
  if(feedbacks.length===0){document.getElementById('feedback-list').innerHTML='<div class="empty-dash">No feedback yet. Be the first!</div>';return;}
  document.getElementById('feedback-list').innerHTML=feedbacks.map(f=>`
    <div class="fb-card">
      <div class="fb-header">
        <div class="fb-name">${f.name}</div>
        <div class="fb-meta">
          <span class="fb-cat">${f.cat}</span>
          <span class="fb-stars">${'★'.repeat(f.rating)}${'☆'.repeat(5-f.rating)}</span>
          <span class="fb-date">${f.date}</span>
        </div>
      </div>
      <div class="fb-text">${f.text}</div>
    </div>`).join('');
}
function clearAll(){if(confirm('Clear all feedback?')){feedbacks=[];save();renderDashboard();}}
</script>
</body>
</html>
