<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guess the Number</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="container">
    <h1>🔢 Guess the Number</h1>

    <div class="difficulty-row">
      <label>Difficulty:</label>
      <select id="difficulty" onchange="newGame()">
        <option value="easy">Easy (1–50, 10 tries)</option>
        <option value="medium" selected>Medium (1–100, 7 tries)</option>
        <option value="hard">Hard (1–200, 5 tries)</option>
      </select>
    </div>

    <p class="hint-text" id="rangeHint">I'm thinking of a number between 1 and 100.</p>

    <div class="input-row">
      <input type="number" id="guessInput" placeholder="Your guess" min="1" />
      <button class="btn" id="guessBtn">Guess</button>
    </div>

    <p class="feedback" id="feedback"></p>
    <p class="tries" id="triesLeft">Tries left: <strong>7</strong></p>

    <div class="history-section">
      <h3>Guess History</h3>
      <div id="historyBar" class="history-bar"></div>
    </div>

    <button class="btn btn-outline" id="newGameBtn">New Game</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
