<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Survey Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .create-survey-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            height: fit-content;
        }

        .form-title {
            color: #333;
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .question-inputs {
            margin-bottom: 15px;
        }

        .question-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .question-input-group input {
            flex: 1;
        }

        .btn-remove {
            padding: 10px 15px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-remove:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        .btn-add-question {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .btn-add-question:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .btn-create-survey {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-create-survey:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .surveys-section {
            display: grid;
            gap: 20px;
        }

        .survey-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .survey-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .survey-title {
            color: #333;
            font-size: 1.3rem;
            font-weight: 600;
            flex: 1;
            word-break: break-word;
            margin-right: 10px;
        }

        .survey-meta {
            color: #999;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .btn-delete-survey {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-delete-survey:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        .survey-description {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .survey-questions {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .question-block {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid #667eea;
        }

        .question-text {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 1.05rem;
        }

        .question-type {
            display: inline-block;
            padding: 4px 12px;
            background: #667eea;
            color: white;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .answer-option {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .answer-option input[type="radio"],
        .answer-option input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .answer-option label {
            margin: 0;
            color: #555;
            cursor: pointer;
            font-weight: 400;
        }

        textarea.survey-textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
        }

        textarea.survey-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .survey-stats {
            display: flex;
            justify-content: space-between;
            padding-top: 15px;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        .btn-submit-survey {
            padding: 15px 30px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
        }

        .btn-submit-survey:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .empty-state {
            background: white;
            border-radius: 20px;
            padding: 60px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .empty-state-text {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .empty-state-subtext {
            color: #999;
            font-size: 0.95rem;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .create-survey-card {
                height: auto;
            }

            h1 {
                font-size: 2rem;
            }
        }

        @media (max-width: 600px) {
            .create-survey-card,
            .survey-card {
                padding: 20px;
            }

            .survey-header {
                flex-direction: column;
            }

            .survey-title {
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Survey Platform</h1>
            <p class="subtitle">Create and distribute surveys easily</p>
        </div>

        <div class="main-grid">
            <div class="create-survey-card">
                <h2 class="form-title">Create Survey</h2>
                <form id="surveyForm">
                    <div class="form-group">
                        <label for="surveyTitle">Survey Title *</label>
                        <input type="text" id="surveyTitle" placeholder="Customer Satisfaction Survey" required>
                    </div>

                    <div class="form-group">
                        <label for="surveyDescription">Description</label>
                        <textarea id="surveyDescription" placeholder="Add survey description..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Questions *</label>
                        <div class="question-inputs" id="questionsContainer">
                            <div class="question-input-group">
                                <select class="question-type-select">
                                    <option value="multiple">Multiple Choice</option>
                                    <option value="text">Text</option>
                                    <option value="rating">Rating (1-5)</option>
                                </select>
                                <input type="text" class="survey-question" placeholder="Question 1">
                                <button type="button" class="btn-remove" onclick="removeQuestion(this)">✕</button>
                            </div>
                        </div>
                        <button type="button" class="btn-add-question" onclick="addQuestion()">+ Add Question</button>
                    </div>

                    <button type="submit" class="btn-create-survey">Create Survey</button>
                </form>
            </div>

            <div class="surveys-section" id="surveysContainer">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div class="empty-state-text">No surveys yet</div>
                    <div class="empty-state-subtext">Create your first survey to get started!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let surveys = JSON.parse(localStorage.getItem('surveys')) || [];

        const surveyForm = document.getElementById('surveyForm');
        const surveysContainer = document.getElementById('surveysContainer');

        surveyForm.addEventListener('submit', (e) => {
            e.preventDefault();
            createSurvey();
        });

        function addQuestion() {
            const container = document.getElementById('questionsContainer');
            const questionCount = container.children.length;
            const div = document.createElement('div');
            div.className = 'question-input-group';
            div.innerHTML = `
                <select class="question-type-select">
                    <option value="multiple">Multiple Choice</option>
                    <option value="text">Text</option>
                    <option value="rating">Rating (1-5)</option>
                </select>
                <input type="text" class="survey-question" placeholder="Question ${questionCount + 1}">
                <button type="button" class="btn-remove" onclick="removeQuestion(this)">✕</button>
            `;
            container.appendChild(div);
        }

        function removeQuestion(btn) {
            btn.parentElement.remove();
        }

        function createSurvey() {
            const title = document.getElementById('surveyTitle').value;
            const description = document.getElementById('surveyDescription').value;
            
            const questions = Array.from(document.querySelectorAll('.survey-question'))
                .map((input, idx) => ({
                    id: idx,
                    text: input.value,
                    type: input.parentElement.querySelector('.question-type-select').value,
                    responses: []
                }))
                .filter(q => q.text.trim());

            if (questions.length === 0) {
                alert('Please add at least 1 question');
                return;
            }

            const survey = {
                id: Date.now(),
                title,
                description,
                questions,
                responses: [],
                createdAt: new Date().toLocaleDateString()
            };

            surveys.unshift(survey);
            saveSurveys();
            renderSurveys();
            surveyForm.reset();

            // Reset questions
            document.getElementById('questionsContainer').innerHTML = `
                <div class="question-input-group">
                    <select class="question-type-select">
                        <option value="multiple">Multiple Choice</option>
                        <option value="text">Text</option>
                        <option value="rating">Rating (1-5)</option>
                    </select>
                    <input type="text" class="survey-question" placeholder="Question 1">
                    <button type="button" class="btn-remove" onclick="removeQuestion(this)">✕</button>
                </div>
            `;
        }

        function deleteSurvey(surveyId) {
            if (confirm('Delete this survey?')) {
                surveys = surveys.filter(s => s.id !== surveyId);
                saveSurveys();
                renderSurveys();
            }
        }

        function submitResponse(surveyId) {
            const survey = surveys.find(s => s.id === surveyId);
            const response = {};

            survey.questions.forEach(q => {
                const input = document.querySelector(`[data-survey="${surveyId}"][data-question="${q.id}"]`);
                if (input) {
                    if (q.type === 'multiple') {
                        response[q.id] = document.querySelector(`input[name="q${q.id}"]:checked`)?.value || '';
                    } else {
                        response[q.id] = input.value;
                    }
                }
            });

            survey.responses.push(response);
            saveSurveys();
            renderSurveys();
            alert('✓ Thank you for completing the survey!');
        }

        function renderSurveys() {
            if (surveys.length === 0) {
                surveysContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div class="empty-state-text">No surveys yet</div>
                        <div class="empty-state-subtext">Create your first survey to get started!</div>
                    </div>
                `;
                return;
            }

            surveysContainer.innerHTML = surveys.map(survey => `
                <div class="survey-card">
                    <div class="survey-header">
                        <div>
                            <h3 class="survey-title">${survey.title}</h3>
                            <p class="survey-meta">Created on ${survey.createdAt} • ${survey.responses.length} responses</p>
                        </div>
                        <button class="btn-delete-survey" onclick="deleteSurvey(${survey.id})">Delete</button>
                    </div>

                    ${survey.description ? `<p class="survey-description">${survey.description}</p>` : ''}

                    <div class="survey-questions">
                        ${survey.questions.map(question => `
                            <div class="question-block">
                                <div class="question-type">${question.type.toUpperCase()}</div>
                                <div class="question-text">${question.text}</div>
                                
                                ${question.type === 'multiple' ? `
                                    <div class="answer-options">
                                        <div class="answer-option">
                                            <input type="radio" name="q${question.id}" value="Yes" data-survey="${survey.id}" data-question="${question.id}" id="q${question.id}_yes">
                                            <label for="q${question.id}_yes">Yes</label>
                                        </div>
                                        <div class="answer-option">
                                            <input type="radio" name="q${question.id}" value="No" data-survey="${survey.id}" data-question="${question.id}" id="q${question.id}_no">
                                            <label for="q${question.id}_no">No</label>
                                        </div>
                                        <div class="answer-option">
                                            <input type="radio" name="q${question.id}" value="Maybe" data-survey="${survey.id}" data-question="${question.id}" id="q${question.id}_maybe">
                                            <label for="q${question.id}_maybe">Maybe</label>
                                        </div>
                                    </div>
                                ` : question.type === 'rating' ? `
                                    <div class="answer-options">
                                        ${[1,2,3,4,5].map(i => `
                                            <div class="answer-option">
                                                <input type="radio" name="q${question.id}" value="${i}" data-survey="${survey.id}" data-question="${question.id}" id="q${question.id}_${i}">
                                                <label for="q${question.id}_${i}">${'⭐'.repeat(i)}</label>
                                            </div>
                                        `).join('')}
                                    </div>
                                ` : `
                                    <textarea class="survey-textarea" data-survey="${survey.id}" data-question="${question.id}" placeholder="Your answer..."></textarea>
                                `}
                            </div>
                        `).join('')}
                    </div>

                    <button class="btn-submit-survey" onclick="submitResponse(${survey.id})">Submit Response</button>

                    <div class="survey-stats">
                        <span>Total Questions: <strong>${survey.questions.length}</strong></span>
                        <span>Total Responses: <strong>${survey.responses.length}</strong></span>
                    </div>
                </div>
            `).join('');
        }

        function saveSurveys() {
            localStorage.setItem('surveys', JSON.stringify(surveys));
        }

        renderSurveys();
    </script>
</body>
</html>
